<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FirstJob.ai — AI-Powered CV Generator</title>

<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f2f5;
  margin: 0;
  padding: 0;
  color: #111827;
}

/* Nav */
nav {
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.logo {
  font-size: 1.2rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo span { color: #2563eb; }
.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.badge {
  background: #eff6ff;
  color: #2563eb;
  font-size: 0.73rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid #bfdbfe;
  letter-spacing: 0.3px;
}
.btn-upgrade-nav {
  padding: 7px 16px;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  box-shadow: 0 2px 8px rgba(109,40,217,0.3);
}
.btn-upgrade-nav:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(109,40,217,0.42);
}

/* Hero */
.hero {
  background: linear-gradient(140deg, #1e3a8a 0%, #1d4ed8 55%, #3b82f6 100%);
  color: #fff;
  padding: 56px 24px 52px;
  text-align: center;
}
.hero h1 {
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 800;
  margin: 0 0 14px;
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(90deg, #93c5fd, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  font-size: 1.05rem;
  opacity: 0.88;
  max-width: 460px;
  margin: 0 auto 28px;
  line-height: 1.6;
}
.steps {
  display: inline-flex;
  gap: 0;
  background: rgba(255,255,255,0.1);
  border-radius: 40px;
  padding: 6px 8px;
  border: 1px solid rgba(255,255,255,0.2);
  flex-wrap: wrap;
  justify-content: center;
}
.step {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.85rem;
  padding: 4px 12px;
  white-space: nowrap;
}
.step:not(:last-child)::after {
  content: '→';
  margin-left: 12px;
  opacity: 0.5;
}
.step-num {
  width: 22px;
  height: 22px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.75rem;
  flex-shrink: 0;
}

/* Sections shared */
.section-wrap {
  padding: 52px 20px;
  text-align: center;
}
.section-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 8px;
}
.section-title {
  font-size: clamp(1.35rem, 3vw, 1.9rem);
  font-weight: 800;
  letter-spacing: -0.5px;
  margin: 0 0 8px;
  color: #111827;
}
.section-sub {
  color: #6b7280;
  font-size: 0.95rem;
  margin: 0 0 36px;
  line-height: 1.6;
}

/* ===== PRICING ===== */
.pricing-wrap {
  background: #fff;
  border-top: 1px solid #e5e7eb;
}
.pricing-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  max-width: 640px;
  margin: 0 auto;
}
@media (max-width: 520px) {
  .pricing-grid { grid-template-columns: 1fr; max-width: 360px; }
}
.plan-card {
  background: #f9fafb;
  border: 1.5px solid #e5e7eb;
  border-radius: 20px;
  padding: 30px 26px 26px;
  text-align: left;
  position: relative;
  transition: box-shadow 0.2s;
}
.plan-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
.plan-card.pro {
  background: linear-gradient(155deg, #f5f3ff 0%, #ede9fe 100%);
  border-color: #a78bfa;
}
.plan-badge {
  position: absolute;
  top: -13px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 4px 14px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(109,40,217,0.35);
}
.plan-name {
  font-size: 0.75rem;
  font-weight: 700;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.9px;
  margin-bottom: 8px;
}
.plan-card.pro .plan-name { color: #7c3aed; }
.plan-price {
  font-size: 2.2rem;
  font-weight: 800;
  color: #111827;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 4px;
}
.plan-card.pro .plan-price { color: #6d28d9; }
.plan-period {
  font-size: 0.82rem;
  font-weight: 500;
  color: #9ca3af;
  margin-bottom: 18px;
}
.plan-features {
  list-style: none;
  padding: 0;
  margin: 0 0 24px;
}
.plan-features li {
  font-size: 0.86rem;
  color: #374151;
  padding: 6px 0;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
.plan-features li:last-child { border-bottom: none; }
.plan-features li .check { color: #10b981; font-weight: 700; flex-shrink: 0; }
.plan-features li.muted { color: #9ca3af; }
.plan-features li.muted .check { color: #d1d5db; }
.btn-plan {
  width: 100%;
  padding: 11px;
  border-radius: 12px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  border: 1.5px solid transparent;
  font-family: inherit;
}
.btn-plan.free-plan {
  background: #f3f4f6;
  color: #374151;
  border-color: #e5e7eb;
}
.btn-plan.free-plan:hover { background: #e5e7eb; }
.btn-plan.pro-plan {
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #fff;
  box-shadow: 0 4px 16px rgba(109,40,217,0.32);
}
.btn-plan.pro-plan:hover {
  background: linear-gradient(135deg, #6d28d9, #5b21b6);
  transform: translateY(-1px);
  box-shadow: 0 6px 22px rgba(109,40,217,0.42);
}

/* ===== MAIN (form area) ===== */
.main {
  max-width: 720px;
  margin: 0 auto;
  padding: 28px 20px 64px;
}

/* Cards */
.card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  margin-bottom: 14px;
  overflow: hidden;
}
.card-header {
  padding: 14px 22px;
  border-bottom: 1px solid #f3f4f6;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fafafa;
}
.card-icon { font-size: 1.1rem; }
.card-title {
  font-weight: 700;
  font-size: 0.9rem;
  color: #374151;
  letter-spacing: 0.1px;
}
.card-body { padding: 20px 22px; }

/* Fields */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}
.field:last-child { margin-bottom: 0; }
label {
  font-size: 0.75rem;
  font-weight: 700;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
input, textarea, select {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1.5px solid #e5e7eb;
  background: #f9fafb;
  font-size: 0.93rem;
  color: #111827;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  font-family: inherit;
  width: 100%;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  background: #fff;
}
input::placeholder, textarea::placeholder { color: #9ca3af; }
textarea {
  min-height: 110px;
  resize: vertical;
  line-height: 1.6;
}
.phone-wrap { display: flex; gap: 8px; }
.phone-wrap select { flex: 0 0 130px; }

/* Generation counter */
.gen-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 10px;
  flex-wrap: wrap;
}
.gen-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1.5px solid #bfdbfe;
  background: #eff6ff;
  color: #1d4ed8;
  transition: all 0.2s;
}
.gen-pill.warning {
  background: #fef3c7;
  border-color: #fcd34d;
  color: #b45309;
}
.gen-pill.empty {
  background: #fef2f2;
  border-color: #fca5a5;
  color: #dc2626;
}
.gen-pill.pro-mode {
  background: linear-gradient(135deg, #f5f3ff, #ede9fe);
  border-color: #a78bfa;
  color: #6d28d9;
}
.btn-link {
  font-size: 0.8rem;
  font-weight: 600;
  color: #6d28d9;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  font-family: inherit;
  padding: 0;
}
.btn-link:hover { color: #5b21b6; }

/* Generate button */
.btn-generate {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #1d4ed8, #2563eb);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 4px;
  box-shadow: 0 2px 12px rgba(37,99,235,0.3);
}
.btn-generate:hover:not(:disabled) {
  background: linear-gradient(135deg, #1e40af, #1d4ed8);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(37,99,235,0.38);
}
.btn-generate:active:not(:disabled) { transform: translateY(0); }
.btn-generate:disabled {
  opacity: 0.65;
  cursor: not-allowed;
  transform: none;
}

/* Loading dots */
.dots { display: inline-flex; gap: 4px; align-items: center; }
.dot {
  width: 6px; height: 6px;
  background: rgba(255,255,255,0.85);
  border-radius: 50%;
  animation: bounce 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 1; }
  40% { transform: translateY(-5px); opacity: 0.6; }
}

/* Error */
.error-msg {
  display: none;
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #dc2626;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.88rem;
  margin-top: 12px;
  font-weight: 500;
}
.error-msg.visible { display: block; }

/* Upgrade inline notice */
.upgrade-notice {
  display: none;
  background: linear-gradient(135deg, #f5f3ff, #ede9fe);
  border: 1.5px solid #c4b5fd;
  border-radius: 14px;
  padding: 22px 20px;
  text-align: center;
  margin-top: 14px;
}
.upgrade-notice.visible { display: block; }
.upgrade-notice-title {
  font-size: 1rem;
  font-weight: 800;
  color: #5b21b6;
  margin-bottom: 6px;
}
.upgrade-notice-text {
  font-size: 0.87rem;
  color: #7c3aed;
  margin-bottom: 16px;
  line-height: 1.5;
}
.btn-upgrade-inline {
  padding: 11px 28px;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  font-family: inherit;
  box-shadow: 0 4px 14px rgba(109,40,217,0.3);
}
.btn-upgrade-inline:hover {
  background: linear-gradient(135deg, #6d28d9, #5b21b6);
  transform: translateY(-1px);
}

/* Output section */
.output-section { display: none; }
.output-section.visible { display: block; }
.output-status {
  padding: 10px 22px 4px;
  font-size: 0.82rem;
  color: #6b7280;
  font-weight: 500;
}
.output-status.generating { color: #2563eb; }
.cv-output {
  padding: 20px 24px;
  white-space: pre-wrap;
  font-family: 'SFMono-Regular', 'Menlo', 'Courier New', monospace;
  font-size: 0.87rem;
  line-height: 1.75;
  color: #1a1a2e;
  min-height: 100px;
  background: #f9fafb;
  border-top: 1px solid #f3f4f6;
  border-bottom: 1px solid #f3f4f6;
}
.cursor {
  display: inline-block;
  width: 2px;
  height: 0.95em;
  background: #2563eb;
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 1px;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
.output-actions {
  display: flex;
  gap: 8px;
  padding: 14px 22px;
  flex-wrap: wrap;
}
.btn-action {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1.5px solid #e5e7eb;
  background: #fff;
  color: #374151;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
}
.btn-action:hover { background: #f9fafb; border-color: #d1d5db; }
.btn-action.primary {
  background: #2563eb;
  border-color: #2563eb;
  color: #fff;
}
.btn-action.primary:hover { background: #1d4ed8; border-color: #1d4ed8; }

/* ===== TESTIMONIALS ===== */
.testimonials-wrap {
  background: #f9fafb;
  border-top: 1px solid #e5e7eb;
  border-bottom: 1px solid #e5e7eb;
}
.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  max-width: 920px;
  margin: 0 auto;
}
@media (max-width: 720px) {
  .testimonials-grid { grid-template-columns: 1fr; max-width: 480px; }
}
.testi-card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  padding: 24px 22px;
  text-align: left;
  box-shadow: 0 2px 14px rgba(0,0,0,0.04);
  transition: box-shadow 0.2s, transform 0.2s;
}
.testi-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  transform: translateY(-2px);
}
.stars {
  color: #f59e0b;
  font-size: 0.88rem;
  margin-bottom: 12px;
  letter-spacing: 2px;
}
.testi-text {
  font-size: 0.88rem;
  color: #374151;
  line-height: 1.7;
  margin-bottom: 18px;
  font-style: italic;
}
.testi-text::before { content: '"'; }
.testi-text::after { content: '"'; }
.testi-author { display: flex; align-items: center; gap: 12px; }
.testi-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  font-weight: 700;
  color: #fff;
}
.testi-name {
  font-size: 0.87rem;
  font-weight: 700;
  color: #111827;
}
.testi-role { font-size: 0.75rem; color: #9ca3af; }

/* ===== REFERRAL ===== */
.referral-wrap {
  background: #fff;
  border-bottom: 1px solid #e5e7eb;
}
.referral-box {
  max-width: 580px;
  margin: 0 auto;
  background: linear-gradient(140deg, #ecfdf5 0%, #d1fae5 100%);
  border: 1.5px solid #6ee7b7;
  border-radius: 22px;
  padding: 34px 30px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(16,185,129,0.1);
}
.referral-icon { font-size: 2.6rem; margin-bottom: 12px; display: block; }
.referral-title {
  font-size: 1.3rem;
  font-weight: 800;
  color: #064e3b;
  margin: 0 0 8px;
  letter-spacing: -0.3px;
}
.referral-desc {
  font-size: 0.93rem;
  color: #047857;
  margin: 0 0 24px;
  line-height: 1.65;
}
.referral-link-wrap {
  display: flex;
  gap: 8px;
  align-items: center;
  background: #fff;
  border: 1.5px solid #6ee7b7;
  border-radius: 12px;
  padding: 5px 5px 5px 16px;
  margin-bottom: 12px;
}
.referral-url {
  flex: 1;
  font-size: 0.82rem;
  color: #065f46;
  font-family: monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
.btn-copy-ref {
  padding: 8px 16px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff;
  border: none;
  border-radius: 9px;
  font-size: 0.84rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-copy-ref:hover {
  background: linear-gradient(135deg, #059669, #047857);
  transform: translateY(-1px);
}
.referral-note {
  font-size: 0.78rem;
  color: #065f46;
  opacity: 0.75;
  line-height: 1.5;
}
.bonus-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #d1fae5;
  border: 1px solid #6ee7b7;
  color: #065f46;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 20px;
  margin-top: 10px;
}

/* ===== MODALS ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
}
.modal-overlay.visible { display: flex; }
.modal {
  background: #fff;
  border-radius: 24px;
  max-width: 440px;
  width: 100%;
  padding: 36px 32px 28px;
  text-align: center;
  position: relative;
  animation: modalIn 0.22s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.93) translateY(12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: #f3f4f6;
  border: none;
  border-radius: 50%;
  width: 32px; height: 32px;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #6b7280;
  transition: background 0.15s;
}
.modal-close:hover { background: #e5e7eb; color: #374151; }
.modal-icon { font-size: 2.8rem; margin-bottom: 10px; display: block; }
.modal-title {
  font-size: 1.5rem;
  font-weight: 800;
  color: #111827;
  margin: 0 0 8px;
  letter-spacing: -0.5px;
}
.modal-sub {
  font-size: 0.9rem;
  color: #6b7280;
  margin: 0 0 20px;
  line-height: 1.6;
}
.modal-price-block {
  background: linear-gradient(135deg, #f5f3ff, #ede9fe);
  border: 1.5px solid #c4b5fd;
  border-radius: 14px;
  padding: 14px 20px;
  margin-bottom: 20px;
}
.modal-price {
  font-size: 2.4rem;
  font-weight: 800;
  color: #6d28d9;
  letter-spacing: -1px;
  line-height: 1;
}
.modal-price-period {
  font-size: 0.85rem;
  color: #7c3aed;
  font-weight: 500;
  margin-top: 2px;
}
.modal-features {
  list-style: none;
  padding: 0;
  margin: 0 0 22px;
  text-align: left;
}
